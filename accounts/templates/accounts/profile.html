{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container py-5">

    <h2 class="mb-4">My Profile</h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body text-center">

                    <h5 class="card-title">
                        {{ user.username }}
                    </h5>

                    <p class="text-muted">
                        {{ user.email }}
                    </p>

                    <a href="{% url 'accounts:logout' %}" class="btn btn-danger">
                        Logout
                    </a>

                </div>
            </div>

        </div>

        <div class="col-md-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <h5 class="mb-3">My Courses</h5>

                    <p>
                        You are not enrolled in any courses yet.
                    </p>

                </div>
            </div>

        </div>

    </div>

</div>

{% endblock %}
